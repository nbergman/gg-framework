name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cross-platform smoke matrix. Every push to main and every PR runs build +
# typecheck + test + bin-smoke on macOS, Linux, and Windows so we catch
# platform-specific regressions before they hit npm.
#
# We deliberately keep the gg-editor + gg-pixel packages out of the matrix
# for now — they have heavier native deps (sharp, transformers) that slow CI
# without buying us much for the framework's release-critical packages
# (gg-ai, gg-agent, ggcoder, gg-boss).

jobs:
  test:
    name: ${{ matrix.os }} · node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22.x]
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build framework packages
        run: |
          pnpm --filter @kenkaiiii/gg-ai build
          pnpm --filter @kenkaiiii/gg-agent build
          pnpm --filter @kenkaiiii/ggcoder build
          pnpm --filter @kenkaiiii/gg-boss build

      - name: Typecheck
        run: |
          pnpm --filter @kenkaiiii/gg-ai check
          pnpm --filter @kenkaiiii/gg-agent check
          pnpm --filter @kenkaiiii/ggcoder check
          pnpm --filter @kenkaiiii/gg-boss check

      - name: Test framework packages
        run: |
          pnpm --filter @kenkaiiii/gg-ai test
          pnpm --filter @kenkaiiii/gg-agent test
          pnpm --filter @kenkaiiii/ggcoder test
          pnpm --filter @kenkaiiii/gg-boss test

      - name: ggboss CLI smoke (extra belt-and-braces)
        run: node packages/gg-boss/dist/cli.js --help
        shell: bash

  # Distribution-critical cross-OS job: stages the per-platform Node runtime,
  # bundles the sidecar, boots it with the bundled runtime (smoke), and runs the
  # Rust unit tests that gate path/window-chrome resolution. The full
  # `tauri build` lives in release.yml; this keeps CI fast while still
  # exercising the per-OS spawn path that breaks installed bundles.
  app:
    name: app · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Linux system deps (tauri)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf libayatana-appindicator3-dev

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build framework packages
        run: |
          pnpm --filter @kenkaiiii/gg-ai build
          pnpm --filter @kenkaiiii/gg-agent build
          pnpm --filter @kenkaiiii/ggcoder build

      - name: Stage node runtime + bundle sidecar
        run: |
          pnpm --filter gg-app stage:node
          pnpm --filter gg-app bundle:sidecar
        shell: bash

      - name: Sidecar smoke (bundled runtime + bundle, per-OS)
        run: node gg-app/scripts/smoke-sidecar.mjs
        shell: bash

      - name: Frontend platform-class test
        run: pnpm --filter gg-app test

      - name: Rust unit tests (path + window-chrome resolution)
        working-directory: gg-app/src-tauri
        run: cargo test
